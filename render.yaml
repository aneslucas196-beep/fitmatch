# Render Blueprint – FitMatch : Web Service (FastAPI) + Worker rappels
# Python 3.12 requis (évite build pydantic-core sur 3.14)
services:
  - type: web
    name: fitmatch-web
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.8"
    # Variables : DATABASE_URL, RESEND_API_KEY, SENDER_EMAIL, CORS_ORIGINS, etc. dans le dashboard (Environment)

  - type: worker
    name: fitmatch-reminders-worker
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python worker.py
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.8"
    # Variables : DATABASE_URL, RESEND_API_KEY, SENDER_EMAIL dans le dashboard (Environment)
