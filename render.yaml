# Render Blueprint – FitMatch : Web Service (FastAPI) + Worker rappels
# Python 3.12 requis (évite build pydantic-core sur 3.14)
services:
  - type: web
    name: fitmatch-web
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python run_render.py
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.8"
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: PYTHONIOENCODING
        value: "utf-8"
    # Variables OBLIGATOIRES : DATABASE_URL (Supabase), SITE_URL, STRIPE_*, RESEND_*, SUPABASE_*, CORS_ORIGINS

  - type: worker
    name: fitmatch-reminders-worker
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python worker.py
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.8"
    # Variables : DATABASE_URL, RESEND_API_KEY, SENDER_EMAIL dans le dashboard (Environment)
