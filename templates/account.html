<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon compte - FitMatch</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, sans-serif; }
        
        .fm-account {
            max-width: 1100px;
            margin: 40px auto;
            display: grid;
            grid-template-columns: 260px 1fr;
            gap: 32px;
            color: #111827;
            padding: 0 20px;
        }
        
        .fm-account-sidebar {
            background: #ffffff;
            border-radius: 16px;
            padding: 24px 20px;
            box-shadow: 0 10px 30px rgba(15, 23, 42, 0.06);
            height: fit-content;
        }
        .fm-account-sidebar h2 {
            font-size: 18px;
            margin-bottom: 16px;
            font-weight: 600;
        }
        .fm-account-sidebar nav {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 24px;
        }
        .fm-account-sidebar a {
            font-size: 15px;
            text-decoration: none;
            color: #6b7280;
            padding: 8px 0;
            transition: color 0.2s;
        }
        .fm-account-sidebar a:hover {
            color: #111827;
        }
        .fm-account-sidebar a.active {
            color: #111827;
            font-weight: 600;
        }
        .fm-link-danger {
            border: none;
            background: transparent;
            color: #ef4444;
            font-size: 14px;
            cursor: pointer;
            padding: 0;
        }
        .fm-link-danger:hover {
            text-decoration: underline;
        }
        
        .fm-account-main {
            background: #f9fafb;
            border-radius: 16px;
            padding: 24px 24px 32px;
            box-shadow: 0 10px 30px rgba(15, 23, 42, 0.04);
        }
        .fm-page-title {
            font-size: 22px;
            margin-bottom: 20px;
            font-weight: 600;
        }
        
        .fm-account-main section + section {
            margin-top: 32px;
        }
        
        .fm-current-booking h2,
        .fm-upcoming h2 {
            font-size: 18px;
            margin-bottom: 14px;
            font-weight: 600;
        }
        
        .fm-booking-card {
            background: #ffffff;
            border-radius: 16px;
            padding: 18px 20px 20px;
            box-shadow: 0 10px 24px rgba(15, 23, 42, 0.06);
            border: 1px solid #e5e7eb;
        }
        .fm-booking-card--confirmed {
            border-color: #22c55e;
        }
        .fm-booking-card--pending {
            border-color: #f59e0b;
        }
        
        .fm-booking-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 8px;
        }
        .fm-booking-date {
            font-weight: 600;
            font-size: 16px;
            margin-bottom: 4px;
        }
        .fm-booking-coach,
        .fm-booking-gym {
            font-size: 14px;
            color: #4b5563;
        }
        .fm-booking-gym {
            margin-top: 2px;
        }
        
        .fm-status-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 10px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 500;
        }
        .fm-status-badge--confirmed {
            background: #dcfce7;
            color: #166534;
        }
        .fm-status-badge--pending {
            background: #fef3c7;
            color: #92400e;
        }
        
        .fm-booking-body {
            margin-top: 8px;
        }
        .fm-booking-service {
            font-size: 14px;
            color: #374151;
            margin-bottom: 12px;
        }
        
        .fm-booking-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 10px;
        }
        .fm-btn-outline {
            padding: 8px 12px;
            border-radius: 999px;
            border: 1px solid #d1d5db;
            background: #ffffff;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
        }
        .fm-btn-outline:hover {
            background: #f3f4f6;
        }
        .fm-btn-danger {
            border-color: #fecaca;
            color: #b91c1c;
        }
        .fm-btn-danger:hover {
            background: #fef2f2;
        }
        .fm-booking-notify {
            border-top: 1px dashed #e5e7eb;
            padding-top: 8px;
            font-size: 13px;
            color: #6b7280;
        }
        .fm-booking-notify label {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }
        .fm-booking-notify input[type="checkbox"] {
            width: 16px;
            height: 16px;
            accent-color: #22c55e;
        }
        
        .fm-booking-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        
        .fm-empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #6b7280;
        }
        .fm-empty-state svg {
            width: 64px;
            height: 64px;
            margin: 0 auto 16px;
            opacity: 0.5;
        }
        
        .fm-user-welcome {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 24px;
        }
        .fm-user-welcome h3 {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 4px;
        }
        .fm-user-welcome p {
            font-size: 14px;
            opacity: 0.9;
        }
        
        @media (max-width: 900px) {
            .fm-account {
                grid-template-columns: 1fr;
            }
            .fm-account-sidebar {
                order: 2;
            }
            .fm-account-main {
                order: 1;
            }
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <div class="fm-account">
        <aside class="fm-account-sidebar">
            <h2>Mon compte</h2>
            <nav>
                <a href="/account" class="active">Mes séances</a>
                <a href="/account/info">Mes informations</a>
                <a href="/account/payments">Mes paiements</a>
            </nav>
            <button class="fm-link-danger" onclick="logout()">Se déconnecter</button>
        </aside>

        <main class="fm-account-main">
            <div class="fm-user-welcome" id="user-welcome" style="display: none;">
                <h3 id="welcome-name">Bonjour !</h3>
                <p id="welcome-email"></p>
            </div>
            
            <h1 class="fm-page-title">Mes séances</h1>

            <section class="fm-upcoming">
                <div class="fm-booking-list" id="bookings-list">
                    <div class="fm-empty-state" id="empty-state">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
                        </svg>
                        <p>Aucune séance à venir</p>
                        <a href="/" class="text-blue-600 hover:underline mt-2 inline-block">Réserver une séance</a>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <dialog id="cancel-modal" style="
        border: none;
        border-radius: 12px;
        padding: 0;
        max-width: 600px;
        width: 90%;
        background: white;
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
    ">
        <div style="padding: 25px;">
            <h1 style="font-size: 24px; margin: 0 0 10px 0; font-weight: 600;">Annulation de séance</h1>
            <p style="color: #444; line-height: 22px; margin: 0;">
                Souhaitez-vous annuler votre séance du 
                <strong id="cancel-date"></strong> à <strong id="cancel-hour"></strong>  
                chez <strong id="cancel-salle"></strong> ?
            </p>

            <div style="background: #fafafa; border: 1px solid #e4e4e4; padding: 15px; border-radius: 10px; margin: 20px 0;">
                <div id="cancel-prestation" style="font-size: 15px; color: #333;"></div>
                <div style="margin-top: 10px; font-size: 14px; color: #777;">
                    <span id="cancel-duration"></span> &nbsp; • &nbsp; <span id="cancel-price"></span>
                </div>
            </div>

            <div style="display: flex; gap: 10px;">
                <button onclick="closeCancelModal()" style="
                    flex: 1;
                    padding: 12px;
                    border-radius: 10px;
                    font-size: 16px;
                    text-align: center;
                    cursor: pointer;
                    border: 2px solid black;
                    background: white;
                    font-weight: 500;
                    transition: 0.2s;
                ">Ne pas annuler</button>
                <button onclick="confirmCancellation()" style="
                    flex: 1;
                    padding: 12px;
                    border-radius: 10px;
                    font-size: 16px;
                    text-align: center;
                    cursor: pointer;
                    border: 2px solid #ff4d4d;
                    background: #ff4d4d;
                    color: white;
                    font-weight: 500;
                    transition: 0.2s;
                ">Confirmer l'annulation</button>
            </div>
        </div>
    </dialog>

    <script>
        const STORAGE_KEY = 'fitmatch';
        const USER_KEY = 'fitmatch.user';
        
        function getStoredData() {
            try {
                const mainData = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
                const userData = JSON.parse(localStorage.getItem(USER_KEY) || 'null');
                
                if (userData && !mainData.user) {
                    mainData.user = userData;
                }
                
                return mainData;
            } catch {
                return {};
            }
        }
        
        function formatDate(dateStr) {
            const date = new Date(dateStr);
            const options = { weekday: 'long', day: 'numeric', month: 'long' };
            return date.toLocaleDateString('fr-FR', options);
        }
        
        function formatShortDate(dateStr) {
            const date = new Date(dateStr);
            const options = { weekday: 'short', day: 'numeric', month: 'short' };
            return date.toLocaleDateString('fr-FR', options);
        }
        
        function isUpcoming(dateStr, time) {
            const [hours, minutes] = (time || '10:00').split(':').map(Number);
            const bookingDate = new Date(dateStr);
            bookingDate.setHours(hours, minutes, 0, 0);
            return bookingDate > new Date();
        }
        
        function loadBookings() {
            const data = getStoredData();
            let user = data.user;
            
            if (!user) {
                try {
                    user = JSON.parse(localStorage.getItem(USER_KEY) || 'null');
                } catch {}
            }
            
            const allBookings = data.bookings || [];
            
            console.log('📊 Données chargées:', { user, bookings: allBookings });
            
            if (!user || !user.verified) {
                console.log('Utilisateur non vérifié, redirection vers /login');
                window.location.href = '/login';
                return;
            }
            
            const welcomeSection = document.getElementById('user-welcome');
            const welcomeName = document.getElementById('welcome-name');
            const welcomeEmail = document.getElementById('welcome-email');
            
            if (user.fullName) {
                welcomeSection.style.display = 'block';
                welcomeName.textContent = `Bonjour ${user.fullName.split(' ')[0]} !`;
                welcomeEmail.textContent = user.email || '';
            }
            
            const bookingsList = document.getElementById('bookings-list');
            const emptyState = document.getElementById('empty-state');
            
            const upcomingBookings = allBookings.filter(b => isUpcoming(b.date, b.time));
            
            if (upcomingBookings.length === 0) {
                emptyState.style.display = 'block';
                return;
            }
            
            emptyState.style.display = 'none';
            
            const sortedBookings = upcomingBookings.sort((a, b) => {
                const dateA = new Date(a.date + 'T' + (a.time || '10:00'));
                const dateB = new Date(b.date + 'T' + (b.time || '10:00'));
                return dateA - dateB;
            });
            
            sortedBookings.forEach((booking, idx) => {
                const card = createBookingCard(booking, idx);
                bookingsList.appendChild(card);
            });
        }
        
        function createBookingCard(booking, index) {
            const article = document.createElement('article');
            const isConfirmed = booking.status === 'confirmed';
            const statusClass = isConfirmed ? 'fm-booking-card--confirmed' : 'fm-booking-card--pending';
            const statusBadgeClass = isConfirmed ? 'fm-status-badge--confirmed' : 'fm-status-badge--pending';
            const statusText = isConfirmed ? 'Confirmée' : 'En attente';
            const statusIcon = isConfirmed ? '✓' : '⏳';
            
            article.className = `fm-booking-card ${statusClass}`;
            article.innerHTML = `
                <header class="fm-booking-header">
                    <div>
                        <p class="fm-booking-date">${formatDate(booking.date)} à ${booking.time || '10:00'}</p>
                        <p class="fm-booking-coach">Avec <strong>${booking.coach || 'Coach'}</strong></p>
                        <p class="fm-booking-gym">${booking.gym || 'Salle de sport'}</p>
                    </div>
                    <span class="fm-status-badge ${statusBadgeClass}">
                        ${statusIcon} ${statusText}
                    </span>
                </header>
                <div class="fm-booking-body">
                    <p class="fm-booking-service">${booking.service || 'Séance de coaching'} – ${booking.duration || 60} min • ${booking.price || 40}€</p>
                    <div class="fm-booking-actions">
                        <button class="fm-btn-outline" onclick="addToCalendar(${index})">📅 Ajouter à l'agenda</button>
                        <button class="fm-btn-outline fm-btn-danger" onclick="cancelBooking(${index})">Annuler</button>
                    </div>
                </div>
            `;
            return article;
        }
        
        let currentCancelIndex = null;
        
        function addToCalendar(index) {
            const data = getStoredData();
            const bookings = (data.bookings || []).filter(b => isUpcoming(b.date, b.time));
            const sortedBookings = bookings.sort((a, b) => new Date(a.date) - new Date(b.date));
            const booking = sortedBookings[index];
            
            if (!booking) return;
            
            const startDate = new Date(booking.date + 'T' + (booking.time || '10:00'));
            const endDate = new Date(startDate.getTime() + (booking.duration || 60) * 60000);
            
            const formatGoogleDate = (d) => d.toISOString().replace(/[-:]/g, '').split('.')[0] + 'Z';
            
            const googleUrl = `https://calendar.google.com/calendar/render?action=TEMPLATE&text=${encodeURIComponent('Séance avec ' + (booking.coach || 'Coach'))}&dates=${formatGoogleDate(startDate)}/${formatGoogleDate(endDate)}&details=${encodeURIComponent(booking.service || 'Séance de coaching')}&location=${encodeURIComponent(booking.gym || '')}`;
            
            window.open(googleUrl, '_blank');
        }
        
        function cancelBooking(index) {
            const data = getStoredData();
            const bookings = (data.bookings || []).filter(b => isUpcoming(b.date, b.time));
            const sortedBookings = bookings.sort((a, b) => new Date(a.date) - new Date(b.date));
            const booking = sortedBookings[index];
            
            if (!booking) return;
            
            currentCancelIndex = index;
            
            const formattedDate = formatDate(booking.date);
            
            document.getElementById('cancel-date').textContent = formattedDate;
            document.getElementById('cancel-hour').textContent = booking.time || '10:00';
            document.getElementById('cancel-salle').textContent = booking.gym || 'Salle de sport';
            document.getElementById('cancel-prestation').textContent = `Séance avec ${booking.coach || 'Coach'}`;
            document.getElementById('cancel-duration').textContent = (booking.duration || 60) + ' min';
            document.getElementById('cancel-price').textContent = (booking.price || 40) + '€';
            
            document.getElementById('cancel-modal').showModal();
        }
        
        function closeCancelModal() {
            document.getElementById('cancel-modal').close();
            currentCancelIndex = null;
        }
        
        async function confirmCancellation() {
            if (currentCancelIndex === null) return;
            
            const data = getStoredData();
            const user = data.user || {};
            const allBookings = data.bookings || [];
            
            const upcomingBookings = allBookings.filter(b => isUpcoming(b.date, b.time));
            const sortedBookings = [...upcomingBookings].sort((a, b) => new Date(a.date) - new Date(b.date));
            const bookingToCancel = sortedBookings[currentCancelIndex];
            
            if (!bookingToCancel) return;
            
            const formattedDate = formatDate(bookingToCancel.date);
            
            try {
                await fetch('/api/cancel-booking', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        booking_id: bookingToCancel.id || bookingToCancel.booking_id || '',
                        client_name: user.fullName || 'Client',
                        client_email: user.email || '',
                        coach_name: bookingToCancel.coach || 'Coach',
                        coach_email: bookingToCancel.coach_email || '',
                        gym_name: bookingToCancel.gym || 'Salle de sport',
                        gym_address: bookingToCancel.gym_address || '',
                        date: formattedDate,
                        time: bookingToCancel.time || '10:00',
                        service: bookingToCancel.service || 'Séance de coaching',
                        duration: (bookingToCancel.duration || 60) + ' min',
                        price: (bookingToCancel.price || 40) + '€',
                        coach_photo: bookingToCancel.coach_photo || null,
                        booking_url: window.location.origin + '/'
                    })
                });
            } catch (e) {
                console.error('Erreur envoi email annulation:', e);
            }
            
            const originalIndex = allBookings.findIndex(b => 
                b.date === bookingToCancel.date && 
                b.time === bookingToCancel.time && 
                b.coach === bookingToCancel.coach
            );
            
            if (originalIndex !== -1) {
                allBookings.splice(originalIndex, 1);
                data.bookings = allBookings;
                localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
            }
            
            closeCancelModal();
            window.location.reload();
        }
        
        function logout() {
            localStorage.removeItem(STORAGE_KEY);
            localStorage.removeItem(USER_KEY);
            window.location.href = '/';
        }
        
        document.addEventListener('DOMContentLoaded', loadBookings);
    </script>
</body>
</html>
