<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Réserver une séance - FitMatch</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { font-family: 'Inter', sans-serif; }
  body { margin: 0; padding: 0; }
  
  .grid-scroll { overflow-x: auto; }
  table { border-collapse: separate; border-spacing: 0; width: 100%; min-width: 800px; }
  thead th { position: sticky; top: 0; background: #fff; z-index: 2; padding: 12px 8px; border-bottom: 1px solid #e2e8f0; text-align: center; font-weight: 600; font-size: 14px; color: #334155; }
  thead small { display: block; color: #94a3b8; font-weight: 400; font-size: 12px; }
  tbody td { padding: 4px; border-bottom: 1px solid #f1f5f9; }
  tbody td:first-child { position: sticky; left: 0; background: #fff; z-index: 1; text-align: right; padding-right: 12px; color: #64748b; font-weight: 500; font-size: 13px; width: 70px; }

  .slot {
    display: flex; align-items: center; justify-content: center;
    height: 38px; border-radius: 8px; border: 1px solid #e2e8f0;
    cursor: pointer; background: #fff; transition: all 0.15s; font-size: 13px; color: #334155;
  }
  .slot:hover { border-color: #10b981; box-shadow: 0 0 0 2px rgba(16, 185, 129, 0.1); }
  .slot.disabled { background: #f8fafc; color: #cbd5e1; border-style: dashed; cursor: not-allowed; }
  .slot.disabled:hover { border-color: #e2e8f0; box-shadow: none; }
  .slot.busy { background: #fef2f2; border-color: #fecaca; color: #dc2626; }
  .slot.busy:hover { border-color: #fecaca; box-shadow: none; cursor: not-allowed; }
  .slot.selected { background: #10b981; border-color: #10b981; color: #fff; box-shadow: 0 0 0 2px rgba(16, 185, 129, 0.2); }
</style>
</head>
<body class="min-h-screen bg-slate-100">

<!-- Header Simple -->
<header class="fixed inset-x-0 top-0 z-50 bg-white border-b border-slate-200">
  <div class="max-w-5xl mx-auto flex items-center justify-between px-6 py-4">
    <a href="/" class="inline-flex items-center">
      <span class="text-2xl font-semibold tracking-tight text-slate-900">Fit<span class="text-emerald-500">Match</span></span>
    </a>
    <a href="javascript:history.back()" class="text-sm text-slate-600 hover:text-slate-900 transition flex items-center gap-1">
      <span>←</span> Retour
    </a>
  </div>
</header>

<!-- Spacer -->
<div class="h-16"></div>

<div class="min-h-screen pb-16">
  
  <!-- En-tête -->
  <div class="bg-white border-b border-slate-200">
    <div class="max-w-5xl mx-auto px-6 py-8">
      <h1 class="text-2xl font-bold text-slate-900 mb-2">Réserver une séance</h1>
      <p class="text-slate-600">Choisis un créneau disponible pour <strong id="coachName" class="text-slate-900">{{ coach.full_name }}</strong></p>
    </div>
  </div>

  <div class="max-w-5xl mx-auto px-6 py-6">
    
    <!-- Carte calendrier -->
    <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
      
      <!-- Navigation semaine -->
      <div class="flex items-center justify-between px-6 py-4 border-b border-slate-100">
        <div class="font-semibold text-slate-900" id="rangeText"></div>
        <div class="flex gap-2">
          <button class="px-4 py-2 text-sm font-medium text-slate-600 bg-slate-100 rounded-lg hover:bg-slate-200 transition" id="prevWeek">← Semaine préc.</button>
          <button class="px-4 py-2 text-sm font-medium text-slate-600 bg-slate-100 rounded-lg hover:bg-slate-200 transition" id="nextWeek">Semaine suiv. →</button>
        </div>
      </div>

      <!-- Grille horaires -->
      <div class="grid-scroll p-4">
        <table>
          <thead>
            <tr id="daysHead"><th></th></tr>
          </thead>
          <tbody id="gridBody"></tbody>
        </table>
      </div>

      <!-- Légende + Confirmation -->
      <div class="flex items-center justify-between px-6 py-4 border-t border-slate-100 bg-slate-50 flex-wrap gap-4">
        <div class="flex gap-4">
          <span class="flex items-center gap-2 text-sm text-slate-600">
            <span class="w-3 h-3 rounded-full bg-emerald-500"></span> Disponible
          </span>
          <span class="flex items-center gap-2 text-sm text-slate-600">
            <span class="w-3 h-3 rounded-full bg-red-400"></span> Occupé
          </span>
          <span class="flex items-center gap-2 text-sm text-slate-600">
            <span class="w-3 h-3 rounded-full bg-slate-300"></span> Indispo
          </span>
        </div>
        <div class="flex items-center gap-4">
          <div class="text-sm font-medium text-slate-700" id="recap">Aucun créneau sélectionné</div>
          <button class="px-5 py-2.5 bg-emerald-500 text-white font-medium rounded-lg hover:bg-emerald-600 transition disabled:opacity-50 disabled:cursor-not-allowed" id="confirmBtn" disabled>
            Confirmer
          </button>
        </div>
      </div>
    </div>

  </div>
</div>

<!-- Toast -->
<div class="fixed right-4 bottom-4 bg-slate-900 text-white px-4 py-3 rounded-lg opacity-0 transform translate-y-2 transition-all" id="toast">
  Réservation confirmée
</div>

<script>
const COACH_ID = "{{ coach.id }}";
const COACH_NAME = "{{ coach.full_name }}";
const COACH_EMAIL = "{{ coach.email or '' }}";
const COACH_PHOTO = "{{ coach.profile_photo_url or coach.profile_photo or coach.photo or '' }}";
const GYM_NAME = "{{ coach.gyms[0].name if coach.gyms else 'Salle de sport' }}";
const GYM_ADDRESS = "{{ coach.gyms[0].address if coach.gyms else '' }}";
const SLOT_MINUTES = 60;
const DAY_START = "08:00";
const DAY_END = "23:00";

const $ = s => document.querySelector(s);
const pad = n => String(n).padStart(2,"0");
const fmtDate = d => `${d.toLocaleDateString('fr-FR',{weekday:'short'})} ${pad(d.getDate())} ${d.toLocaleDateString('fr-FR',{month:'short'})}`;
function addMinutes(date, m){ const d=new Date(date); d.setMinutes(d.getMinutes()+m); return d; }
function setTime(base, hhmm){const [h,m]=hhmm.split(':').map(Number);const d=new Date(base);d.setHours(h,m,0,0);return d;}
function between(date, start, end){return date>=start && date<end;}

async function fetchAvailability(coachId, fromISO, toISO){
  const res = await fetch(`/api/bookings/availability?coach_id=${coachId}&from=${fromISO}&to=${toISO}`);
  if(!res.ok) return [];
  return await res.json();
}

async function fetchBookings(coachId, fromISO, toISO){
  const res = await fetch(`/api/bookings?coach_id=${coachId}&from=${fromISO}&to=${toISO}`);
  if(!res.ok) return { bookings: [], working_hours: {} };
  const data = await res.json();
  if (Array.isArray(data)) {
    return { bookings: data, working_hours: {} };
  }
  return data;
}

let weekOffset = 0;
let selection = null;

async function renderWeek(){
  const today = new Date(); today.setHours(0,0,0,0);
  const start = new Date(today); start.setDate(start.getDate() + (weekOffset*7));
  const end = new Date(start); end.setDate(end.getDate()+6);

  $("#rangeText").textContent = `${start.toLocaleDateString('fr-FR')} – ${end.toLocaleDateString('fr-FR')}`;

  const headRow = $("#daysHead");
  headRow.innerHTML = "<th></th>";
  const days = [];
  for(let i=0;i<7;i++){
    const d = new Date(start); d.setDate(d.getDate()+i);
    days.push(d);
    const th = document.createElement("th");
    th.innerHTML = `<div>${fmtDate(d)}<small>${d.getFullYear()}</small></div>`;
    headRow.appendChild(th);
  }

  const times = [];
  let cursor = setTime(start, DAY_START);
  const dayEnd = setTime(start, DAY_END);
  while(cursor < dayEnd){
    times.push(cursor.toTimeString().slice(0,5));
    cursor = addMinutes(cursor, SLOT_MINUTES);
  }

  const avail = await fetchAvailability(COACH_ID, start.toISOString(), end.toISOString());
  const bookingsData = await fetchBookings(COACH_ID, start.toISOString(), end.toISOString());
  const bookings = bookingsData.bookings || [];
  const body = $("#gridBody"); body.innerHTML = "";

  function statusFor(dtStart, time, dayDate){
    const dtEnd = addMinutes(dtStart, SLOT_MINUTES);
    if(dtStart < new Date()) return "disabled";
    
    const inAvail = avail.some(a=>{
      const s=new Date(a.start), e=new Date(a.end);
      return between(dtStart,s,e) && dtEnd<=e;
    });
    if(!inAvail) return "disabled";
    const isBusy = bookings.some(b=>{
      const s=new Date(b.start), e=new Date(b.end);
      return !(dtEnd<=s || dtStart>=e);
    });
    return isBusy ? "busy" : "free";
  }

  times.forEach(time=>{
    const tr = document.createElement("tr");
    const th = document.createElement("td");
    th.textContent = time;
    tr.appendChild(th);

    days.forEach((d,dayIndex)=>{
      const td = document.createElement("td");
      const slotStart = setTime(d, time);
      const st = statusFor(slotStart, time, d);
      const btn = document.createElement("div");
      btn.className = `slot ${st}`;
      btn.textContent = time;

      if(st==="free"){
        btn.addEventListener("click", ()=>{
          document.querySelectorAll(".slot.selected").forEach(el=>el.classList.remove("selected"));
          btn.classList.add("selected");
          selection = {
            start: slotStart,
            end: addMinutes(slotStart,SLOT_MINUTES),
            dayIndex
          };
          $("#recap").textContent = `Séance le ${d.toLocaleDateString('fr-FR',{weekday:'long',day:'2-digit',month:'long'})} à ${time}`;
          $("#confirmBtn").disabled = false;
        });
      }

      td.appendChild(btn);
      tr.appendChild(td);
    });

    body.appendChild(tr);
  });

  selection = null;
  $("#recap").textContent = "Aucun créneau sélectionné";
  $("#confirmBtn").disabled = true;
}

$("#prevWeek").addEventListener("click", ()=>{ weekOffset--; renderWeek(); });
$("#nextWeek").addEventListener("click", ()=>{ weekOffset++; renderWeek(); });

$("#confirmBtn").addEventListener("click", ()=>{
  if(!selection) return;
  
  const startDate = selection.start;
  const dateStr = startDate.toISOString().split('T')[0];
  const timeStr = `${pad(startDate.getHours())}:${pad(startDate.getMinutes())}`;
  
  const params = new URLSearchParams({
    coach: COACH_NAME,
    coach_email: COACH_EMAIL,
    service: "Séance de coaching",
    duration: "60",
    price: "40",
    gym: GYM_NAME,
    gym_address: GYM_ADDRESS,
    coach_photo: COACH_PHOTO,
    date: dateStr,
    time: timeStr
  });
  
  window.location.href = `/reservation?${params.toString()}`;
});

function showToast(msg){
  const t=$("#toast"); t.textContent=msg; t.classList.add("opacity-100", "translate-y-0");
  t.classList.remove("opacity-0", "translate-y-2");
  setTimeout(()=>{
    t.classList.remove("opacity-100", "translate-y-0");
    t.classList.add("opacity-0", "translate-y-2");
  }, 2200);
}

renderWeek();
</script>
</body>
</html>
