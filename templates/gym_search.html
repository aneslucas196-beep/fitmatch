{% extends "base.html" %}

{% block title %}Recherche de Salles - Coach Fitness{% endblock %}

{% block content %}
<div class="max-w-4xl mx-auto px-4 py-8">
    <h1 class="text-3xl font-bold text-center mb-8">Recherche de Salles de Sport</h1>
    
    <!-- Formulaire de recherche -->
    <div class="bg-white rounded-lg shadow-md p-6 mb-8">
        <form id="search-form" class="space-y-4">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <!-- Recherche par ville/adresse -->
                <div>
                    <label for="location" class="block text-sm font-medium text-gray-700 mb-2">
                        Ville ou adresse
                    </label>
                    <input type="text" id="location" name="location" 
                           placeholder="Ex: Paris, Lyon, Marseille..."
                           class="w-full border border-gray-300 rounded-md px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                
                <!-- Sélection du pays -->
                <div>
                    <label for="country" class="block text-sm font-medium text-gray-700 mb-2">
                        Pays
                    </label>
                    <select id="country" name="country" 
                            class="w-full border border-gray-300 rounded-md px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
                        <option value="">Tous les pays</option>
                        <!-- Les pays seront chargés dynamiquement -->
                    </select>
                </div>
                
                <!-- Rayon de recherche -->
                <div>
                    <label for="radius" class="block text-sm font-medium text-gray-700 mb-2">
                        Rayon (km)
                    </label>
                    <select id="radius" name="radius" 
                            class="w-full border border-gray-300 rounded-md px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
                        <option value="5">5 km</option>
                        <option value="10">10 km</option>
                        <option value="25" selected>25 km</option>
                        <option value="50">50 km</option>
                        <option value="100">100 km</option>
                    </select>
                </div>
            </div>
            
            <div class="flex justify-center">
                <button type="submit" 
                        class="bg-blue-600 text-white px-6 py-2 rounded-md hover:bg-blue-700 transition duration-200">
                    🔍 Rechercher
                </button>
            </div>
        </form>
    </div>
    
    <!-- Zone de résultats -->
    <div id="results-container" class="hidden">
        <div class="bg-white rounded-lg shadow-md p-6">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-xl font-semibold">Résultats de recherche</h2>
                <span id="results-count" class="text-gray-600"></span>
            </div>
            
            <!-- Liste des salles -->
            <div id="gyms-list" class="space-y-4">
                <!-- Les résultats seront affichés ici -->
            </div>
            
            <!-- Pagination -->
            <div id="pagination" class="flex justify-center mt-6 hidden">
                <nav class="flex space-x-2">
                    <!-- Les boutons de pagination seront ajoutés ici -->
                </nav>
            </div>
        </div>
    </div>
    
    <!-- Zone de chargement -->
    <div id="loading" class="hidden text-center py-8">
        <div class="inline-block animate-spin rounded-full h-8 w-8 border-b-2 border-blue-600"></div>
        <p class="mt-2 text-gray-600">Recherche en cours...</p>
    </div>
    
    <!-- Zone d'erreur -->
    <div id="error-container" class="hidden bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded mb-4">
        <p id="error-message"></p>
    </div>
</div>

<script>
// Variables globales
let currentPage = 1;
let currentSearchParams = {};

// Charger les pays au chargement de la page
document.addEventListener('DOMContentLoaded', function() {
    loadCountries();
    
    // Gérer la soumission du formulaire
    document.getElementById('search-form').addEventListener('submit', function(e) {
        e.preventDefault();
        currentPage = 1;
        performSearch();
    });
});

// Charger la liste des pays
async function loadCountries() {
    try {
        const response = await fetch('/api/gyms/countries');
        const data = await response.json();
        
        if (data.success) {
            const countrySelect = document.getElementById('country');
            
            data.countries.forEach(country => {
                const option = document.createElement('option');
                option.value = country.code;
                option.textContent = country.name;
                countrySelect.appendChild(option);
            });
        }
    } catch (error) {
        console.error('Erreur lors du chargement des pays:', error);
    }
}

// Effectuer une recherche
async function performSearch() {
    const location = document.getElementById('location').value.trim();
    const country = document.getElementById('country').value;
    const radius = parseInt(document.getElementById('radius').value);
    
    // Validation
    if (!location && !country) {
        showError('Veuillez saisir une ville/adresse ou sélectionner un pays');
        return;
    }
    
    // Afficher le chargement
    showLoading();
    hideError();
    hideResults();
    
    try {
        let searchUrl = '';
        
        if (location) {
            // Recherche géographique par ville/adresse
            // D'abord géocoder l'adresse
            const geoResponse = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(location)}&limit=1`);
            const geoData = await geoResponse.json();
            
            if (geoData && geoData.length > 0) {
                const lat = parseFloat(geoData[0].lat);
                const lng = parseFloat(geoData[0].lon);
                
                searchUrl = `/api/gyms/near?lat=${lat}&lng=${lng}&radius=${radius}`;
                if (country) {
                    searchUrl += `&country=${country}`;
                }
            } else {
                throw new Error('Impossible de localiser cette adresse');
            }
        } else {
            // Recherche par pays uniquement
            searchUrl = `/api/gyms/worldwide?country=${country}&page=${currentPage}&page_size=50`;
        }
        
        const response = await fetch(searchUrl);
        const data = await response.json();
        
        if (data.success) {
            displayResults(data);
            currentSearchParams = { location, country, radius };
        } else {
            throw new Error(data.message || 'Erreur lors de la recherche');
        }
        
    } catch (error) {
        console.error('Erreur de recherche:', error);
        showError(error.message);
    } finally {
        hideLoading();
    }
}

// Afficher les résultats
function displayResults(data) {
    const resultsContainer = document.getElementById('results-container');
    const gymsList = document.getElementById('gyms-list');
    const resultsCount = document.getElementById('results-count');
    
    // Vider les résultats et pagination précédents
    gymsList.innerHTML = '';
    hidePagination(); // Toujours cacher la pagination d'abord
    
    if (!data.gyms || data.gyms.length === 0) {
        gymsList.innerHTML = '<p class="text-gray-600 text-center py-8">Aucune salle trouvée pour cette recherche.</p>';
        resultsCount.textContent = '0 résultat';
    } else {
        // Afficher le nombre de résultats
        const count = data.count || data.gyms.length;
        resultsCount.textContent = `${count} résultat${count > 1 ? 's' : ''}`;
        
        // Afficher chaque salle
        data.gyms.forEach(gym => {
            const gymCard = createGymCard(gym);
            gymsList.appendChild(gymCard);
        });
        
        // Afficher la pagination seulement pour les recherches par pays (pas pour les recherches géographiques)
        if (data.pagination && data.pagination.total_pages > 1) {
            displayPagination(data.pagination);
        }
    }
    
    resultsContainer.classList.remove('hidden');
}

// Créer une carte pour une salle
function createGymCard(gym) {
    const card = document.createElement('div');
    card.className = 'border border-gray-200 rounded-lg p-4 hover:shadow-md transition duration-200';
    
    const distance = gym.distance_km ? ` (${gym.distance_km.toFixed(1)} km)` : '';
    const phone = gym.phone ? `<p class="text-sm text-gray-600">📞 ${gym.phone}</p>` : '';
    const website = gym.website ? `<p class="text-sm text-gray-600">🌐 <a href="${gym.website}" target="_blank" class="text-blue-600 hover:underline">${gym.website}</a></p>` : '';
    
    card.innerHTML = `
        <div class="flex justify-between items-start">
            <div class="flex-1">
                <h3 class="text-lg font-semibold text-gray-900">${gym.name}${distance}</h3>
                <p class="text-gray-600">${gym.address || gym.city}</p>
                <p class="text-sm text-gray-500">${gym.country_name || gym.country_code}</p>
                ${phone}
                ${website}
            </div>
            <div class="text-sm text-gray-500 text-right">
                <p>Source: ${gym.source || 'Manuel'}</p>
            </div>
        </div>
    `;
    
    return card;
}

// Fonctions utilitaires
function showLoading() {
    document.getElementById('loading').classList.remove('hidden');
}

function hideLoading() {
    document.getElementById('loading').classList.add('hidden');
}

function showError(message) {
    document.getElementById('error-message').textContent = message;
    document.getElementById('error-container').classList.remove('hidden');
}

function hideError() {
    document.getElementById('error-container').classList.add('hidden');
}

function hideResults() {
    document.getElementById('results-container').classList.add('hidden');
}

function hidePagination() {
    const paginationContainer = document.getElementById('pagination');
    const nav = paginationContainer.querySelector('nav');
    nav.innerHTML = ''; // Vider les boutons
    paginationContainer.classList.add('hidden'); // Cacher le conteneur
}

function displayPagination(pagination) {
    const paginationContainer = document.getElementById('pagination');
    const nav = paginationContainer.querySelector('nav');
    
    // Vider les boutons précédents
    nav.innerHTML = '';
    
    // Bouton Précédent
    if (pagination.has_previous) {
        const prevButton = document.createElement('button');
        prevButton.textContent = '← Précédent';
        prevButton.className = 'px-3 py-2 bg-blue-600 text-white rounded-md hover:bg-blue-700 transition duration-200';
        prevButton.onclick = () => {
            currentPage = pagination.page - 1;
            performSearchWithCurrentParams();
        };
        nav.appendChild(prevButton);
    }
    
    // Informations de page
    const pageInfo = document.createElement('span');
    pageInfo.textContent = `Page ${pagination.page} sur ${pagination.total_pages}`;
    pageInfo.className = 'px-4 py-2 text-gray-700 bg-gray-100 rounded-md';
    nav.appendChild(pageInfo);
    
    // Bouton Suivant
    if (pagination.has_next) {
        const nextButton = document.createElement('button');
        nextButton.textContent = 'Suivant →';
        nextButton.className = 'px-3 py-2 bg-blue-600 text-white rounded-md hover:bg-blue-700 transition duration-200';
        nextButton.onclick = () => {
            currentPage = pagination.page + 1;
            performSearchWithCurrentParams();
        };
        nav.appendChild(nextButton);
    }
    
    // Afficher le conteneur de pagination
    paginationContainer.classList.remove('hidden');
}

// Effectuer une recherche avec les paramètres actuels (pour la pagination)
async function performSearchWithCurrentParams() {
    if (!currentSearchParams.location && !currentSearchParams.country) {
        return;
    }
    
    // Afficher le chargement
    showLoading();
    hideError();
    
    try {
        let searchUrl = '';
        
        if (currentSearchParams.location) {
            // Recherche géographique par ville/adresse
            // D'abord géocoder l'adresse
            const geoResponse = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(currentSearchParams.location)}&limit=1`);
            const geoData = await geoResponse.json();
            
            if (geoData && geoData.length > 0) {
                const lat = parseFloat(geoData[0].lat);
                const lng = parseFloat(geoData[0].lon);
                
                searchUrl = `/api/gyms/near?lat=${lat}&lng=${lng}&radius=${currentSearchParams.radius}`;
                if (currentSearchParams.country) {
                    searchUrl += `&country=${currentSearchParams.country}`;
                }
            } else {
                throw new Error('Impossible de localiser cette adresse');
            }
        } else {
            // Recherche par pays uniquement avec pagination
            searchUrl = `/api/gyms/worldwide?country=${currentSearchParams.country}&page=${currentPage}&page_size=50`;
        }
        
        const response = await fetch(searchUrl);
        const data = await response.json();
        
        if (data.success) {
            displayResults(data);
        } else {
            throw new Error(data.message || 'Erreur lors de la recherche');
        }
        
    } catch (error) {
        console.error('Erreur de recherche:', error);
        showError(error.message);
    } finally {
        hideLoading();
    }
}
</script>
{% endblock %}
