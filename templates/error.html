<!DOCTYPE html>
<html lang="{{ locale|default('fr') }}" {% if text_direction == 'rtl' %}dir="rtl"{% endif %}>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ t.errors["500_title"] if t and t.get("errors") else "Erreur" }} - FitMatch</title>
    <script src="https://cdn.tailwindcss.com" nonce="{{ csp_nonce }}"></script>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center p-4">
    <div class="text-center max-w-lg">
        <h1 class="text-6xl font-bold text-red-600 mb-4">500</h1>
        <h2 class="text-2xl font-semibold text-gray-800 mb-2">
            {{ t.errors["500_title"] if t and t.get("errors") else "Erreur serveur" }}
        </h2>
        <p class="text-gray-600 mb-6">
            {{ error if error else (t.errors["500_message"] if t and t.get("errors") else "Une erreur inattendue s'est produite.") }}
        </p>
        <a href="/" class="inline-block px-6 py-3 bg-red-600 text-white font-medium rounded-lg hover:bg-red-700">
            {{ t.errors["back_home"] if t and t.get("errors") else "Retour à l'accueil" }}
        </a>
    </div>
</body>
</html>
