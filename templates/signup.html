{% extends "base.html" %}

{% block title %}Inscription - Coach Fitness{% endblock %}

{% block content %}
<div class="max-w-md mx-auto bg-white rounded-lg shadow-md p-8">
    <h1 class="text-2xl font-bold text-center mb-6">Créer un compte</h1>
    
    <form action="/signup" method="POST" class="space-y-4">
        <div>
            <label for="full_name" class="block text-sm font-medium text-gray-700 mb-2">Nom complet</label>
            <input type="text" name="full_name" id="full_name" required
                   class="w-full border border-gray-300 rounded-md px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>
        
        <div>
            <label for="email" class="block text-sm font-medium text-gray-700 mb-2">Email</label>
            <input type="email" name="email" id="email" required
                   class="w-full border border-gray-300 rounded-md px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>
        
        <div>
            <label for="password" class="block text-sm font-medium text-gray-700 mb-2">Mot de passe</label>
            <input type="password" name="password" id="password" required
                   class="w-full border border-gray-300 rounded-md px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>
        
        <div>
            <label for="role" class="block text-sm font-medium text-gray-700 mb-2">Type de compte</label>
            <select name="role" id="role" required
                    class="w-full border border-gray-300 rounded-md px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
                <option value="client">Client</option>
                <option value="coach">Coach</option>
            </select>
        </div>
        
        <button type="submit" class="w-full bg-blue-600 text-white py-2 rounded-md hover:bg-blue-700 transition duration-200">
            S'inscrire
        </button>
    </form>
    
    <p class="text-center mt-4 text-sm text-gray-600">
        Déjà un compte ? 
        <a href="/login" class="text-blue-600 hover:text-blue-800">Se connecter</a>
    </p>
</div>
{% endblock %}
