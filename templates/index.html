<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FitMatch - Réservez en salle</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>

  <!-- Navbar -->
  <header class="navbar">
    <div class="logo">FitMatch</div>
    <div class="nav-buttons">
      <a href="/signup?role=coach" class="btn-coach">Je suis un coach</a>
      <a href="/login" class="btn-compte">Mon compte</a>
    </div>
  </header>

  <!-- Hero Section -->
  <section class="hero">
    <div class="overlay"></div>
    <div class="content">
      <h1>Réservez en salle</h1>
      <p>Simple • Immédiat • 24h/24</p>

      <div class="search-box">
        <div class="top-inputs">
          <input type="text" placeholder="Nom du coach, prestations (muscu, cardio...)" />
          <input type="text" placeholder="Adresse, ville..." />
        </div>
        <div class="bottom-input">
          <input type="text" placeholder="Quelle salle ?" />
          <button class="btn-search">Rechercher</button>
        </div>
      </div>
    </div>
  </section>

  <script src="/static/script.js"></script>
</body>
</html>
