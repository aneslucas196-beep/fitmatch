<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Réinitialiser votre mot de passe – FitMatch</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    font-family: 'Poppins', system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    background:#fafafa;
    color:#0b0f14;
    -webkit-font-smoothing:antialiased;
    min-height: 100vh;
  }
  
  :root{
    --accent:#008f57;
    --accent-dark:#006d42;
    --muted:#606971;
    --line:#e8edf2;
    --card:#ffffff;
  }

  header {
    background: #fff;
    padding: 16px 24px;
    border-bottom: 1px solid var(--line);
    display: flex;
    justify-content: center;
    align-items: center;
  }
  
  .logo {
    font-weight: 700;
    font-size: 22px;
    color: #0b0f14;
    text-decoration: none;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  
  .logo span {
    color: var(--accent);
  }

  .container {
    max-width: 440px;
    margin: 60px auto;
    padding: 0 20px;
  }
  
  .card {
    background: var(--card);
    border-radius: 16px;
    padding: 40px;
    border: 1px solid var(--line);
    box-shadow: 0 4px 24px rgba(0,0,0,0.06);
  }
  
  .header-text {
    text-align: center;
    margin-bottom: 32px;
  }
  
  .header-text h1 {
    font-size: 24px;
    font-weight: 700;
    margin: 0 0 10px;
    color: #0b0f14;
  }
  
  .header-text p {
    color: var(--muted);
    font-size: 15px;
    margin: 0;
    line-height: 1.5;
  }

  .form-group {
    margin-bottom: 20px;
  }
  
  .form-label {
    display: block;
    font-size: 14px;
    font-weight: 600;
    color: #374151;
    margin-bottom: 8px;
  }
  
  .form-label .required {
    color: #dc2626;
  }
  
  .input-wrap {
    position: relative;
  }
  
  .form-input {
    width: 100%;
    padding: 14px 48px 14px 16px;
    font-size: 15px;
    font-family: inherit;
    border: 2px solid var(--line);
    border-radius: 10px;
    background: #f9fafb;
    transition: all 0.2s ease;
  }
  
  .form-input:focus {
    outline: none;
    border-color: var(--accent);
    background: #fff;
    box-shadow: 0 0 0 4px rgba(0,143,87,0.1);
  }
  
  .toggle-password {
    position: absolute;
    right: 14px;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    cursor: pointer;
    color: var(--muted);
    padding: 4px;
    display: flex;
  }
  
  .toggle-password:hover {
    color: var(--accent);
  }

  .submit-btn {
    width: 100%;
    padding: 16px;
    font-size: 16px;
    font-weight: 600;
    font-family: inherit;
    color: white;
    background: #0b0f14;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.2s ease;
    margin-top: 8px;
  }
  
  .submit-btn:hover {
    background: #1f2937;
    transform: translateY(-1px);
    box-shadow: 0 6px 20px rgba(0,0,0,0.15);
  }
  
  .submit-btn:disabled {
    opacity: 0.6;
    cursor: not-allowed;
    transform: none;
  }

  .error-alert {
    background: #fef2f2;
    border: 1px solid #fecaca;
    color: #dc2626;
    padding: 14px 18px;
    border-radius: 10px;
    margin-bottom: 24px;
    font-size: 14px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .success-view {
    text-align: center;
    padding: 20px 0;
    display: none;
  }
  
  .success-view .icon {
    font-size: 56px;
    margin-bottom: 16px;
  }
  
  .success-view h2 {
    font-size: 20px;
    font-weight: 700;
    margin: 0 0 10px;
    color: var(--accent);
  }
  
  .success-view p {
    color: var(--muted);
    font-size: 15px;
    margin: 0 0 24px;
  }

  .toast {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%) translateY(-100px);
    background: var(--accent);
    color: white;
    padding: 14px 24px;
    border-radius: 10px;
    font-weight: 600;
    font-size: 15px;
    box-shadow: 0 10px 40px rgba(0,143,87,0.3);
    z-index: 1000;
    opacity: 0;
    transition: all 0.3s ease;
  }
  
  .toast.show {
    transform: translateX(-50%) translateY(0);
    opacity: 1;
  }

  @media (max-width: 640px) {
    .card {
      padding: 28px 24px;
    }
    .header-text h1 {
      font-size: 20px;
    }
  }
</style>
</head>
<body>

<header>
  <a href="/" class="logo">
    Fit<span>Match</span>
  </a>
</header>

<div class="container">
  <div class="card">
    <div id="formView">
      <div class="header-text">
        <h1>Réinitialisez votre mot de passe</h1>
        <p>Pour valider votre nouveau mot de passe, saisissez-le dans le champ ci-dessous.</p>
      </div>
      
      {% if error %}
      <div class="error-alert">
        <span>⚠️</span>
        <span>{{ error }}</span>
      </div>
      {% endif %}

      <form id="resetForm" method="POST" action="/reset-password">
        <input type="hidden" name="token" value="{{ token }}">
        
        <div class="form-group">
          <label class="form-label">
            Nouveau mot de passe <span class="required">*</span>
          </label>
          <div class="input-wrap">
            <input 
              type="password" 
              name="password" 
              id="password"
              class="form-input" 
              placeholder="Votre nouveau mot de passe"
              required
              minlength="8"
            >
            <button type="button" class="toggle-password" onclick="togglePassword()">
              <svg id="eye-icon" width="22" height="22" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
              </svg>
            </button>
          </div>
        </div>
        
        <button type="submit" class="submit-btn" id="submitBtn">
          Changer le mot de passe
        </button>
      </form>
    </div>
    
    <div id="successView" class="success-view">
      <div class="icon">✅</div>
      <h2>Mot de passe modifié !</h2>
      <p>Connexion à votre compte en cours...</p>
    </div>
  </div>
</div>

<div class="toast" id="toast">Votre mot de passe a été modifié</div>

<script>
function togglePassword() {
  const input = document.getElementById('password');
  const icon = document.getElementById('eye-icon');
  
  if (input.type === 'password') {
    input.type = 'text';
    icon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/>';
  } else {
    input.type = 'password';
    icon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>';
  }
}

document.getElementById('resetForm').addEventListener('submit', async function(e) {
  e.preventDefault();
  
  const btn = document.getElementById('submitBtn');
  const password = document.getElementById('password').value;
  const token = document.querySelector('input[name="token"]').value;
  
  btn.disabled = true;
  btn.textContent = 'Modification en cours...';
  
  try {
    const res = await fetch('/api/reset-password', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token, password })
    });
    
    const data = await res.json();
    
    if (data.success) {
      document.getElementById('formView').style.display = 'none';
      document.getElementById('successView').style.display = 'block';
      
      if (data.session_token) {
        document.cookie = `session_token=${data.session_token}; path=/; SameSite=Lax`;
      }
      
      const redirectUrl = data.role === 'coach' ? '/coach/portal' : '/client/home';
      
      setTimeout(() => {
        window.location.href = redirectUrl + '?password_changed=1';
      }, 1500);
    } else {
      alert(data.error || 'Une erreur est survenue');
      btn.disabled = false;
      btn.textContent = 'Changer le mot de passe';
    }
  } catch(err) {
    alert('Une erreur est survenue. Veuillez réessayer.');
    btn.disabled = false;
    btn.textContent = 'Changer le mot de passe';
  }
});
</script>
</body>
</html>
