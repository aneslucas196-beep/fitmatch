<!DOCTYPE html>
<html lang="{{ locale|default('fr') }}" {% if locale == 'ar' %}dir="rtl"{% endif %}>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ t.coach_pay.page_title|default('Paiement 30€ – FitMatch') }}</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #f0fdf4 0%, #ecfdf5 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            max-width: 420px;
            width: 100%;
            padding: 40px 32px;
            text-align: center;
        }
        .card h1 {
            font-size: 1.5rem;
            color: #0f172a;
            margin-bottom: 8px;
        }
        .card p {
            color: #64748b;
            margin-bottom: 24px;
            font-size: 0.95rem;
        }
        .price {
            font-size: 2rem;
            font-weight: 700;
            color: #008f57;
            margin-bottom: 32px;
        }
        .btn {
            display: block;
            width: 100%;
            padding: 18px 24px;
            font-size: 1.1rem;
            font-weight: 600;
            color: #fff;
            background: #008f57;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn:hover { background: #006d42; }
        .btn:disabled { opacity: 0.7; cursor: not-allowed; }
        .error { color: #dc2626; font-size: 0.9rem; margin-top: 16px; }
        .spinner { display: inline-block; width: 20px; height: 20px; border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin 0.8s linear infinite; vertical-align: middle; margin-right: 8px; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="card">
        <a href="/coach-login" class="block text-sm text-slate-500 hover:text-slate-700 mb-6 text-left">&larr; {{ t.coach_pay.back|default('Retour') }}</a>
        <h1>{{ t.coach_pay.title|default('Abonnement coach FitMatch') }}</h1>
        <p>{{ t.coach_pay.subtitle|default('Un seul clic pour payer et activer ton compte.') }}</p>
        <div class="price">{{ t.coach_pay.price|default('30€ / mois') }}</div>
        <button type="button" class="btn" id="payBtn">
            <span id="btnText">{{ t.coach_pay.button|default('Payer par carte bancaire (Stripe)') }}</span>
        </button>
        <p id="errorMsg" class="error" style="display:none;"></p>
    </div>
    <script>
        window.__COACH_PAY_I18N__ = {{ (t.coach_pay or {}) | tojson }};
        var _cp = function() { return window.__COACH_PAY_I18N__ || {}; };
        document.getElementById('payBtn').onclick = async function() {
            var btn = this;
            var btnText = document.getElementById('btnText');
            var err = document.getElementById('errorMsg');
            err.style.display = 'none';
            btn.disabled = true;
            btnText.innerHTML = '<span class="spinner"></span> ' + (_cp().redirecting || 'Redirection vers Stripe...');
            var token = (new URLSearchParams(window.location.search)).get('token') || '';
            var headers = { 'Content-Type': 'application/json' };
            if (token) headers['X-Signup-Token'] = token;
            var endpoints = ['/api/stripe/create-checkout-session', '/api/create_checkout_session'];
            var lastError = '';
            for (var i = 0; i < endpoints.length; i++) {
                var url = endpoints[i];
                try {
                    console.log('[Stripe] POST', url, 'token:', token ? 'present' : 'absent');
                    var r = await fetch(url, {
                        method: 'POST',
                        headers: headers,
                        credentials: 'include',
                        body: JSON.stringify({ billing_period: 'monthly' })
                    });
                    var data = {};
                    try { data = await r.json(); } catch (_) { data = {}; }
                    console.log('[Stripe] Reponse', url, 'status:', r.status, 'data:', JSON.stringify(data));
                    if (r.ok && data && (data.url || data.checkout_url)) {
                        var redirectUrl = data.url || data.checkout_url;
                        console.log('[Stripe] URL recue:', redirectUrl);
                        if (redirectUrl && redirectUrl.startsWith('http')) {
                            console.log('[Stripe] Redirection vers Stripe Checkout');
                            window.location.href = redirectUrl;
                            return;
                        }
                    }
                    lastError = data.error || data.detail || (r.status === 401 ? 'Session expiree. Rechargez la page.' : (r.status === 503 ? (data.error || 'Paiement indisponible') : 'Erreur serveur'));
                    if (i === 0) console.log('[Stripe] Premier endpoint echoue, essai fallback...');
                } catch (e) {
                    console.error('[Stripe] Erreur', url, e);
                    lastError = e.message || 'Erreur reseau';
                }
            }
            err.textContent = lastError || (_cp().error_retry || 'Erreur. Rechargez et reessayez.');
            err.style.display = 'block';
            btn.disabled = false;
            btnText.textContent = _cp().button || 'Payer par carte bancaire (Stripe)';
        };
    </script>
</body>
</html>
