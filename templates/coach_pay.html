<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paiement 30€ – FitMatch</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #f0fdf4 0%, #ecfdf5 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            max-width: 420px;
            width: 100%;
            padding: 40px 32px;
            text-align: center;
        }
        .card h1 {
            font-size: 1.5rem;
            color: #0f172a;
            margin-bottom: 8px;
        }
        .card p {
            color: #64748b;
            margin-bottom: 24px;
            font-size: 0.95rem;
        }
        .price {
            font-size: 2rem;
            font-weight: 700;
            color: #008f57;
            margin-bottom: 32px;
        }
        .btn {
            display: block;
            width: 100%;
            padding: 18px 24px;
            font-size: 1.1rem;
            font-weight: 600;
            color: #fff;
            background: #008f57;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn:hover { background: #006d42; }
        .btn:disabled { opacity: 0.7; cursor: not-allowed; }
        .error { color: #dc2626; font-size: 0.9rem; margin-top: 16px; }
        .spinner { display: inline-block; width: 20px; height: 20px; border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin 0.8s linear infinite; vertical-align: middle; margin-right: 8px; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="card">
        <h1>Abonnement coach FitMatch</h1>
        <p>Un seul clic pour payer et activer ton compte.</p>
        <div class="price">30€ / mois</div>
        <button type="button" class="btn" id="payBtn">
            <span id="btnText">Payer par carte bancaire (Stripe)</span>
        </button>
        <p id="errorMsg" class="error" style="display:none;"></p>
    </div>
    <script>
        document.getElementById('payBtn').onclick = async function() {
            var btn = this;
            var btnText = document.getElementById('btnText');
            var err = document.getElementById('errorMsg');
            err.style.display = 'none';
            btn.disabled = true;
            btnText.innerHTML = '<span class="spinner"></span> Redirection vers Stripe...';
            try {
                var r = await fetch('/api/stripe/create-checkout-session', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({ billing_period: 'monthly' })
                });
                var data = await r.json();
                if (data && data.url) {
                    window.location.href = data.url;
                    return;
                }
                throw new Error(data && data.error ? data.error : 'Erreur serveur');
            } catch (e) {
                err.textContent = e.message || 'Erreur. Réessayez.';
                err.style.display = 'block';
                btn.disabled = false;
                btnText.textContent = 'Payer par carte bancaire (Stripe)';
            }
        };
    </script>
</body>
</html>
