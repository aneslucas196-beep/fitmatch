<!DOCTYPE html>
<html lang="{{ locale|default('fr') }}" {% if locale == 'ar' %}dir="rtl"{% endif %}>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ t.coach_pay.page_title|default('Paiement 30€ – FitMatch') }}</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #f0fdf4 0%, #ecfdf5 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            max-width: 420px;
            width: 100%;
            padding: 40px 32px;
            text-align: center;
        }
        .card h1 {
            font-size: 1.5rem;
            color: #0f172a;
            margin-bottom: 8px;
        }
        .card p {
            color: #64748b;
            margin-bottom: 24px;
            font-size: 0.95rem;
        }
        .price {
            font-size: 2rem;
            font-weight: 700;
            color: #008f57;
            margin-bottom: 32px;
        }
        .btn {
            display: block;
            width: 100%;
            padding: 18px 24px;
            font-size: 1.1rem;
            font-weight: 600;
            color: #fff;
            background: #008f57;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn:hover { background: #006d42; }
        .btn:disabled { opacity: 0.7; cursor: not-allowed; }
        .error { color: #dc2626; font-size: 0.9rem; margin-top: 16px; }
        .spinner { display: inline-block; width: 20px; height: 20px; border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin 0.8s linear infinite; vertical-align: middle; margin-right: 8px; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="card">
        <a href="/coach-login" class="block text-sm text-slate-500 hover:text-slate-700 mb-6 text-left">&larr; {{ t.coach_pay.back|default('Retour') }}</a>
        <h1>{{ t.coach_pay.title|default('Abonnement coach FitMatch') }}</h1>
        <p>{{ t.coach_pay.subtitle|default('Un seul clic pour payer et activer ton compte.') }}</p>
        <div class="price">{{ t.coach_pay.price|default('30€ / mois') }}</div>
        <button type="button" class="btn" id="stripe-checkout-btn">
            Payer par carte bancaire (Stripe)
        </button>
        <p id="errorMsg" class="error" style="display:none;"></p>
    </div>
    <script>
    document.getElementById("stripe-checkout-btn").addEventListener("click", async function () {
      try {
        console.log("Bouton Stripe clique");

        var token = (new URLSearchParams(window.location.search)).get("token") || "";
        var headers = { "Content-Type": "application/json" };
        if (token) headers["X-Signup-Token"] = token;

        var response = await fetch("/api/create_checkout_session", {
          method: "POST",
          headers: headers,
          credentials: "include",
          body: JSON.stringify({ billing_period: "monthly" })
        });

        var data = await response.json();

        console.log("Reponse backend:", data);

        if (data.url) {
          window.location.href = data.url;
        } else {
          var errEl = document.getElementById("errorMsg");
          if (errEl) { errEl.textContent = data.error || data.detail || "Erreur Stripe: pas d'URL retournee"; errEl.style.display = "block"; }
          else alert("Erreur Stripe: pas d'URL retournee");
        }
      } catch (error) {
        console.error("Erreur:", error);
        var errEl = document.getElementById("errorMsg");
        if (errEl) { errEl.textContent = "Erreur: " + error.message; errEl.style.display = "block"; }
        else alert("Erreur Stripe: " + error.message);
      }
    });
    </script>
</body>
</html>
