<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}FitMatch{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Leaflet CSS et JS pour la carte -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <!-- Script de debug pour la recherche -->
    <script src="/static/search-debug.js"></script>
</head>
<body class="bg-gray-50 min-h-screen">
    <nav class="bg-white shadow-lg border-b border-gray-200">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center py-3">
                <a href="/" class="flex items-center">
                    <img src="/static/logo.png" alt="FitMatch" class="h-10 w-auto">
                </a>
                <div class="flex items-center space-x-6">
                    <a href="/" class="text-gray-700 hover:text-emerald-600 font-medium">Accueil</a>
                    <a href="/signup" class="text-gray-700 hover:text-emerald-600 font-medium">S'inscrire</a>
                    <a href="/login" class="text-gray-700 hover:text-emerald-600 font-medium">Connexion</a>
                    <a href="/coach/portal" class="bg-emerald-600 text-white px-4 py-2 rounded-lg hover:bg-emerald-700 font-medium">Espace Coach</a>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto py-6 px-4 sm:px-6 lg:px-8">
        {% block content %}{% endblock %}
    </main>

    <footer class="bg-gray-800 text-white mt-12">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
            <div class="text-center">
                <p>&copy; 2024 FitMatch. Tous droits réservés.</p>
            </div>
        </div>
    </footer>
</body>
</html>
