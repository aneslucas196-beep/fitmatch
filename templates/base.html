<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}FitMatch – Trouvez des coachs sportifs et des salles près de vous{% endblock %}</title>
    <meta name="description" content="{% block meta_description %}FitMatch est la plateforme pour trouver des coachs sportifs, gérer vos clients et développer votre activité fitness. Inscription gratuite pour les coachs et les salles.{% endblock %}">
    <meta name="keywords" content="coach sportif, fitness, salle de sport, coach personnel, FitMatch, trouver coach fitness">
    <meta name="author" content="FitMatch">
    <link rel="icon" type="image/x-icon" href="/static/favicon.ico">
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="{% block og_url %}{{ site_url|default('https://fitmatch.fr') }}/{% endblock %}">
    <meta property="og:title" content="{% block og_title %}FitMatch – Plateforme pour coachs sportifs{% endblock %}">
    <meta property="og:description" content="{% block og_description %}Développez votre activité fitness avec FitMatch. Trouvez des clients, gérez vos réservations et développez votre business.{% endblock %}">
    <meta property="og:image" content="{% block og_image %}{{ site_url|default('https://fitmatch.fr') }}/static/logo.png{% endblock %}">
    <meta property="og:locale" content="fr_FR">
    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="{% block twitter_title %}FitMatch – Plateforme fitness{% endblock %}">
    <meta name="twitter:description" content="{% block twitter_description %}La plateforme pour coachs sportifs et salles de sport.{% endblock %}">
    <meta name="twitter:image" content="{{ site_url|default('https://fitmatch.fr') }}/static/logo.png">
    <!-- Données structurées Google (Schema.org) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "FitMatch",
      "url": "{{ site_url|default('https://fitmatch.fr') }}",
      "description": "Plateforme pour coachs sportifs et fitness",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "{{ site_url|default('https://fitmatch.fr') }}/gyms/finder?q={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>
    <script src="https://cdn.tailwindcss.com" nonce="{{ get_csp_nonce(request) if request else '' }}"></script>
    <!-- Leaflet CSS et JS pour la carte -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" nonce="{{ get_csp_nonce(request) if request else '' }}"></script>
    <!-- Script de debug pour la recherche -->
    <script src="/static/search-debug.js" nonce="{{ get_csp_nonce(request) if request else '' }}"></script>
    <!-- Sélecteur de langue (externalisé pour CSP) -->
    <script src="/static/language-selector.js" nonce="{{ get_csp_nonce(request) if request else '' }}"></script>
</head>
<body class="bg-gray-50 min-h-screen">
    <nav class="bg-blue-600 text-white shadow-lg">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center py-4">
                <div class="flex items-center">
                    <h1 class="text-xl font-bold">FitMatch</h1>
                </div>
                <div class="flex space-x-4 items-center">
                    <a href="/" class="hover:text-blue-200">Accueil</a>
                    <a href="/signup" class="hover:text-blue-200">S'inscrire</a>
                    <a href="/login" class="hover:text-blue-200">Connexion</a>
                    <a href="/coach-login" class="hover:text-blue-200">Espace Coach</a>
                    <!-- Sélecteur de langue -->
                    <div class="language-selector relative ml-4">
                        <button onclick="toggleLanguageMenu()" class="bg-blue-700 hover:bg-blue-800 px-3 py-1 rounded-lg text-sm flex items-center gap-1">
                            🌐 {{ locale|default('fr')|upper }}
                        </button>
                        <div id="langMenu" class="hidden absolute top-full right-0 mt-2 bg-white rounded-lg shadow-xl min-w-[150px] z-50 overflow-hidden">
                            {% for lang in available_languages|default([]) %}
                            <a href="/set-language/{{ lang.code }}" class="block px-4 py-3 text-gray-800 hover:bg-green-50 text-sm border-b border-gray-100 {% if lang.code == locale %}bg-green-50 font-semibold{% endif %}">
                                {{ lang.name }}
                            </a>
                            {% endfor %}
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto py-6 px-4 sm:px-6 lg:px-8">
        {% block content %}{% endblock %}
    </main>

    <footer class="bg-gray-800 text-white mt-12">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
            <div class="text-center">
                <p>&copy; 2024 FitMatch. Tous droits réservés.</p>
            </div>
        </div>
    </footer>
</body>
</html>
