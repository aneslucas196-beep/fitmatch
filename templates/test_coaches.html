<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Test Coaches API</title>
    <style>
        body { font-family: Arial; padding: 20px; max-width: 800px; margin: 0 auto; }
        .coach { border: 1px solid #ddd; padding: 15px; margin: 10px 0; border-radius: 8px; }
        .coach h3 { margin: 0 0 10px 0; color: #333; }
        .info { color: #666; font-size: 14px; }
        .gyms { background: #f5f5f5; padding: 8px; margin-top: 10px; border-radius: 4px; }
    </style>
</head>
<body>
    <h1>🧪 Test des Coaches RÉELS</h1>
    <p>Cette page charge les coaches depuis l'API <code>/api/coaches</code></p>
    
    <div id="status">Chargement...</div>
    <div id="coaches"></div>
    
    <script nonce="{{ csp_nonce }}">
        async function loadCoaches() {
            try {
                const response = await fetch('/api/coaches');
                const data = await response.json();
                
                const statusDiv = document.getElementById('status');
                const coachesDiv = document.getElementById('coaches');
                
                if (data.success) {
                    statusDiv.innerHTML = `✅ <strong>${data.count} coaches chargés</strong> depuis la base de données`;
                    
                    coachesDiv.innerHTML = data.coaches.map(coach => `
                        <div class="coach">
                            <h3>${coach.full_name || coach.name || 'Coach'}</h3>
                            <div class="info">
                                📧 Email: ${coach.email || 'N/A'}<br>
                                📍 Ville: ${coach.city || 'N/A'}<br>
                                💪 Spécialités: ${(coach.specialties || []).join(', ') || 'Aucune'}<br>
                                💰 Prix: ${coach.price_from || 'N/A'}€/séance<br>
                                ⭐ Note: ${coach.rating || 'N/A'}/5 (${coach.reviews_count || 0} avis)
                            </div>
                            <div class="gyms">
                                🏋️ Salles (${(coach.gyms || []).length}): ${(coach.gyms || []).join(', ') || 'Aucune'}
                            </div>
                        </div>
                    `).join('');
                } else {
                    statusDiv.innerHTML = `❌ Erreur: ${data.error}`;
                }
            } catch (error) {
                document.getElementById('status').innerHTML = `❌ Erreur: ${error.message}`;
            }
        }
        
        loadCoaches();
    </script>
</body>
</html>
