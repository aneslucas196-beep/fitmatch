<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>FitMatch – Créer mon compte</title>
  <style>
    body { margin:0; font-family: system-ui, -apple-system, Segoe UI, Roboto; background:#f7f7f8; color:#111; }
    .container { max-width:520px; margin:40px auto; padding:0 16px; }
    .card { background:#fff; border-radius:14px; box-shadow:0 1px 0 rgba(0,0,0,.06); padding:22px; }
    h1 { font-size:24px; margin:0 0 16px; }
    label { display:block; font-size:14px; color:#6b7280; margin:12px 0 6px; }
    input { width:100%; padding:13px 14px; border:1px solid #e5e7eb; border-radius:12px; font-size:16px; }
    .btn { width:100%; margin-top:16px; padding:14px 16px; border:none; background:#111; color:#fff; border-radius:12px; font-weight:700; cursor:pointer; }
    .btn:hover { background:#333; }
    .muted { margin-top:10px; color:#6b7280; font-size:13px; text-align:center; }
    a { color:#2563eb; text-decoration:none; }
    a:hover { text-decoration:underline; }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <h1>Créer mon compte</h1>
      <form id="form">
        <label>Nom complet</label>
        <input required id="name" placeholder="Ex. Marie Dupont" />

        <label>Email</label>
        <input required id="email" type="email" placeholder="vous@email.com" />

        <label>Mot de passe</label>
        <input required id="pwd" type="password" placeholder="••••••••" />

        <button class="btn" type="submit">Continuer</button>
      </form>
      <div class="muted">
        En continuant, vous acceptez les <a href="/terms">CGU</a>.<br>
        Déjà un compte ? <a href="/login">Se connecter</a>
      </div>
    </div>
  </div>

  <script>
    const KEY='fm_user';
    function setUser(u){ localStorage.setItem(KEY, JSON.stringify(u)); }
    function back(){
      const to = sessionStorage.getItem('redirect_to') || '/reservation';
      location.href = to;
    }
    document.getElementById('form').addEventListener('submit', (e)=>{
      e.preventDefault();
      const name = document.getElementById('name').value.trim();
      const email= document.getElementById('email').value.trim();
      if(!name || !email){ return; }
      setUser({ name, email });
      back();
    });
  </script>
</body>
</html>
