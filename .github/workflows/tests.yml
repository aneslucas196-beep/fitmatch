name: Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: fitmatch_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Wait for Postgres and create schema
        env:
          DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/fitmatch_test"
        run: |
          python -c "
          import time
          import psycopg2
          import os
          for i in range(30):
            try:
              conn = psycopg2.connect(os.environ['DATABASE_URL'])
              cur = conn.cursor()
              with open('migrations/000_initial_users.sql') as f:
                sql = f.read()
              for stmt in sql.split(';'):
                s = '\n'.join(l for l in stmt.split('\n') if not l.strip().startswith('--')).strip()
                if s:
                  cur.execute(s)
              conn.commit()
              cur.close()
              conn.close()
              print('Schema OK')
              break
            except Exception as e:
              print(f'Wait postgres ({i}): {e}')
              time.sleep(1)
          else:
            raise SystemExit('Postgres not ready')
          "

      - name: Run pytest
        env:
          DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/fitmatch_test"
        run: |
          pytest tests/ -v --tb=short
